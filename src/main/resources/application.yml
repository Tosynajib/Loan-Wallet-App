server:
  port: 8080

spring:
  application:
    name: fintech-loan-wallet-api

  datasource:
    url: jdbc:postgresql://localhost:5433/koins_db
    username: koins_user
    password: koins_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: change-this-secret-to-a-very-long-secure-key-for-local-development-only-123456
    expiration-minutes: 120

  paystack:
    base-url: https://api.paystack.co
    secret-key:
    callback-url: http://localhost:8080/api/v1/payments/callback

  termii:
    base-url: https://api.ng.termii.com
    api-key:
    sender-id: KOINS

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    org.springframework.security: INFO
    com.tosin.koins: DEBUG